<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060608" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>REDLINE Sales Academy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { min-height: 100dvh; background: #060608; }
      body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      ::selection { background: rgba(220,38,38,0.3); color: #fff; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #060608; }
      ::-webkit-scrollbar-thumb { background: #1A1A1E; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #2A2A2E; }
      input::placeholder { color: #333; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
