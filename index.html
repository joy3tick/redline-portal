<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F7F8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/redline-logo.png" />
    <link rel="apple-touch-icon" href="/redline-logo.png" />
    <title>Redline Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Apply persisted theme before first paint so users don't see a flash
      // of light theme when they've chosen dark. The full var palette is
      // defined in GLOBAL_CSS once the React bundle loads.
      try {
        var t = localStorage.getItem("portalTheme");
        if (t === "dark" || t === "light") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { min-height: 100dvh; background: #F7F7F8; }
      html[data-theme="dark"], html[data-theme="dark"] body, html[data-theme="dark"] #root { background: #0E0F14; color: #F2F4F8; }
      body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; letter-spacing: -0.011em; line-height: 1.5; font-feature-settings: "kern","liga","calt","ss01","cv11"; font-optical-sizing: auto; }
      ::selection { background: rgba(220,38,38,0.28); color: #FFFFFF; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(15,23,42,0.10); border-radius: 10px; }
      html[data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); }
      ::-webkit-scrollbar-thumb:hover { background: rgba(220,38,38,0.3); }
      input::placeholder { color: #94A3B8; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
